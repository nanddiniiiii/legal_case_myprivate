<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Results - LegalSearch Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #6366f1;
            --dark-bg: #0f0f23;
            --card-bg: #1a1b3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text-primary); line-height: 1.6; }
        .navbar { background: rgba(26, 27, 58, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); }
        .navbar-brand i { color: var(--accent-color); }
        .nav-link { color: var(--text-secondary) !important; }
        .nav-link:hover, .nav-link.active { color: var(--accent-color) !important; }
        .page-header-section { padding: 3rem 0 2rem; } /* Reduced padding */
        .page-title { font-size: 2.5rem; font-weight: 700; background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; }
        .back-nav { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); text-decoration: none; font-weight: 500; margin-bottom: 1rem; transition: color 0.3s ease; }
        .back-nav:hover { color: var(--accent-color); text-decoration: none; }
        .results-section { padding-bottom: 4rem; }
        .result-card-link { /* Style the link wrapping the card */
            display: block;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px; /* Slightly smaller radius */
            padding: 1.5rem; /* Slightly reduced padding */
            margin-bottom: 1.5rem;
            text-decoration: none; /* Remove underline */
            color: inherit; /* Inherit text color */
            transition: all 0.3s ease;
        }
        .result-card-link:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            color: inherit;
        }
        .result-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.1rem; /* Slightly smaller title */
            margin-bottom: 0.5rem;
             display: -webkit-box; /* Truncate long titles */
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-text-preview {
            color: var(--text-secondary);
            font-size: 0.9rem; /* Smaller text */
            margin-bottom: 0;
            display: -webkit-box; /* Truncate description */
            -webkit-line-clamp: 3; /* Show 3 lines */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .loading-spinner-container { text-align: center; padding: 4rem 2rem; }
        .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border-color); border-radius: 50%; border-top-color: var(--accent-color); animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .gradient-text { background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .error-message { text-align: center; color: var(--error-color); padding: 4rem 2rem; }
        .no-results-message { text-align: center; color: var(--text-secondary); padding: 4rem 2rem; font-style: italic; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html" style="font-weight: 700; text-decoration: none;">
                <i class="fas fa-balance-scale me-2"></i>LegalSearch Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Search Cases</a></li>
                    <li class="nav-item"><a class="nav-link active" href="browse.html">Browse</a></li>
                    <li class="nav-item"><a class="nav-link" href="recent-searches.html">Recent Searches</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">My Account</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-header-section">
        <div class="container">
             <a href="browse.html" class="back-nav"> <i class="fas fa-arrow-left"></i>
                Back to Categories
            </a>
            <h1 id="page-title" class="page-title">Loading Category...</h1>
            <p id="page-subtitle" class="page-subtitle text-secondary">Fetching cases...</p>
        </div>
    </section>

    <section class="results-section">
        <div class="container">
            <div id="results-container">
                <div class="loading-spinner-container">
                    <div class="loading-spinner mx-auto mb-3"></div>
                    <h5 class="gradient-text">Fetching Cases...</h5>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category'); // e.g., 'criminal_law'
            const categoryName = urlParams.get('name') || category.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase()); // Format name if not provided

            // Update titles
            document.title = `${categoryName} Cases - LegalSearch Pro`;
            document.getElementById('page-title').textContent = `${categoryName} Cases`;
            document.getElementById('page-subtitle').textContent = `Showing cases related to ${categoryName}.`;

            if (category) {
                fetchCases(category);
            } else {
                showError('Error: No category specified in the URL.');
            }
        });

        async function fetchCases(category) {
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = `
                <div class="loading-spinner-container">
                    <div class="loading-spinner mx-auto mb-3"></div>
                    <h5 class="gradient-text">Fetching Cases...</h5>
                </div>`; // Show loading state again

            try {
                // Ensure API server is running at http://127.0.0.1:5000
                const apiUrl = `http://127.0.0.1:5000/browse?category=${encodeURIComponent(category)}`;
                console.log("Fetching browse results from:", apiUrl);
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({error:`API Error: ${response.status}`}));
                    throw new Error(errorData.error || `API returned status: ${response.status}`);
                }

                const results = await response.json();
                console.log("Received browse results:", results);
                displayResults(results);

            } catch (error) {
                console.error('Error fetching category cases:', error);
                showError(`Could not fetch data for this category. Please ensure the API server is running and the category is valid.<br><i>Details: ${error.message}</i>`);
            }
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('results-container');
            if (!results || results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results-message">
                        <h3><i class="fas fa-box-open"></i> No Cases Found</h3>
                        <p>There are currently no cases available for this specific category.</p>
                    </div>`;
                return;
            }

            let html = '';
            results.forEach((result, index) => {
                const title = result.title || 'No Title Provided';
                const text = result.judgment_text || 'No description preview available.';
                const caseNumber = result.case_number; // Get the case number

                // *** WRAP the card content in an <a> tag ***
                html += `
                    <a href="case-details.html?case=${encodeURIComponent(caseNumber || '')}" class="result-card-link" title="View details for ${title}">
                         <h5 class="result-title">${title}</h5>
                         <p class="result-text-preview">${text}</p>
                         <small style='color: var(--accent-color); font-size: 0.75rem; display: block; margin-top: 0.5rem;'>Case No: ${caseNumber || 'N/A'}</small>
                    </a>
                `;
            });
            resultsContainer.innerHTML = html; // Replace loading spinner with results
        }

        function showError(message) {
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = `
                <div class="error-message">
                    <h3><i class="fas fa-exclamation-triangle me-2"></i>Error Fetching Cases</h3>
                    <p>${message}</p>
                    <a href="browse.html" class="btn btn-secondary mt-3">Back to Categories</a>
                </div>`;
        }
    </script>
</body>
</html>
