<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - LegalSearch Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --dark-bg: #0f0f23;
            --card-bg: #1a1b3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --glow-color: rgba(99, 102, 241, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at top left, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom right, rgba(245, 87, 108, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        .signup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
        }

        /* Floating Elements Animation */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 15s infinite ease-in-out;
        }

        .floating-element:nth-child(1) {
            top: 15%;
            left: 15%;
            animation-delay: 0s;
            font-size: 1.8rem;
        }

        .floating-element:nth-child(2) {
            top: 70%;
            right: 20%;
            animation-delay: -5s;
            font-size: 2.2rem;
        }

        .floating-element:nth-child(3) {
            bottom: 20%;
            left: 25%;
            animation-delay: -10s;
            font-size: 1.6rem;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            33% {
                transform: translateY(-30px) rotate(120deg);
            }
            66% {
                transform: translateY(-60px) rotate(240deg);
            }
        }

        .signup-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }

        .card-header {
            background: transparent;
            border: none;
            padding: 3rem 3rem 1rem;
            text-align: center;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .brand-logo i {
            font-size: 2.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-text {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .signup-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .signup-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .card-body {
            padding: 0 3rem 3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label i {
            color: var(--accent-color);
            font-size: 0.9rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--glow-color);
            color: var(--text-primary);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.875rem;
        }

        .strength-bar {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak { background: #ef4444; width: 25%; }
        .strength-fair { background: #f59e0b; width: 50%; }
        .strength-good { background: #10b981; width: 75%; }
        .strength-strong { background: #059669; width: 100%; }

        .btn-signup {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-signup::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-signup:hover::before {
            left: 100%;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .divider {
            margin: 2rem 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            background: var(--card-bg);
            padding: 0 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .terms-checkbox {
            margin-bottom: 1.5rem;
        }

        .terms-checkbox .form-check-input:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .terms-checkbox .form-check-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .terms-checkbox a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 576px) {
            .signup-container {
                padding: 1rem;
            }
            
            .card-header,
            .card-body {
                padding-left: 2rem;
                padding-right: 2rem;
            }
            
            .brand-text {
                font-size: 1.5rem;
            }
            
            .brand-logo i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Background Elements -->
    <div class="floating-elements">
        <div class="floating-element">
            <i class="fas fa-user-plus"></i>
        </div>
        <div class="floating-element">
            <i class="fas fa-shield-alt"></i>
        </div>
        <div class="floating-element">
            <i class="fas fa-graduation-cap"></i>
        </div>
    </div>

    <div class="signup-container">
        <div class="signup-card">
            <div class="card-header">
                <div class="brand-logo">
                    <i class="fas fa-balance-scale"></i>
                    <span class="brand-text">LegalSearch Pro</span>
                </div>
                <h2 class="signup-title">Create Your Account</h2>
                <p class="signup-subtitle">Join the future of legal research</p>
            </div>
            
            <div class="card-body">
                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullName" class="form-label">
                            <i class="fas fa-user"></i>Full Name
                        </label>
                        <div class="position-relative">
                            <input type="text" class="form-control" id="fullName" 
                                   placeholder="Enter your full name" required>
                            <i class="input-icon fas fa-user-circle"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i>Email Address
                        </label>
                        <div class="position-relative">
                            <input type="email" class="form-control" id="email" 
                                   placeholder="Enter your email" required>
                            <i class="input-icon fas fa-at"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="organization" class="form-label">
                            <i class="fas fa-building"></i>Organization (Optional)
                        </label>
                        <div class="position-relative">
                            <input type="text" class="form-control" id="organization" 
                                   placeholder="Law firm, court, or organization">
                            <i class="input-icon fas fa-briefcase"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i>Password
                        </label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="password" 
                                   placeholder="Create a strong password" required>
                            <i class="input-icon fas fa-eye-slash" id="togglePassword" 
                               style="cursor: pointer;" onclick="togglePasswordVisibility('password', 'togglePassword')"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthBar"></div>
                            </div>
                            <div id="strengthText" style="color: var(--text-secondary);">Password strength</div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">
                            <i class="fas fa-lock"></i>Confirm Password
                        </label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="confirmPassword" 
                                   placeholder="Confirm your password" required>
                            <i class="input-icon fas fa-eye-slash" id="toggleConfirmPassword" 
                               style="cursor: pointer;" onclick="togglePasswordVisibility('confirmPassword', 'toggleConfirmPassword')"></i>
                        </div>
                        <div id="passwordMatch" style="font-size: 0.875rem; margin-top: 0.5rem;"></div>
                    </div>
                    
                    <div class="terms-checkbox">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-signup">
                        <i class="fas fa-user-plus me-2"></i>
                        Create Account
                    </button>
                </form>
                
                <div class="divider">
                    <span>or</span>
                </div>
                
                <button class="btn btn-outline-light w-100" style="border-radius: 12px; padding: 0.875rem;">
                    <i class="fab fa-google me-2"></i>
                    Sign up with Google
                </button>
                
                <div class="login-link">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle password visibility
        function togglePasswordVisibility(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(iconId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }

        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 0;
            const checks = {
                length: password.length >= 8,
                lowercase: /[a-z]/.test(password),
                uppercase: /[A-Z]/.test(password),
                numbers: /\d/.test(password),
                special: /[^A-Za-z0-9]/.test(password)
            };
            
            strength = Object.values(checks).filter(Boolean).length;
            
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            strengthBar.className = 'strength-fill';
            
            if (strength < 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#ef4444';
            } else if (strength < 3) {
                strengthBar.classList.add('strength-fair');
                strengthText.textContent = 'Fair password';
                strengthText.style.color = '#f59e0b';
            } else if (strength < 4) {
                strengthBar.classList.add('strength-good');
                strengthText.textContent = 'Good password';
                strengthText.style.color = '#10b981';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#059669';
            }
            
            return strength;
        }

        // Check password match
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirmPassword && password !== confirmPassword) {
                matchDiv.innerHTML = '<i class="fas fa-times me-1" style="color: #ef4444;"></i>Passwords do not match';
                matchDiv.style.color = '#ef4444';
                return false;
            } else if (confirmPassword && password === confirmPassword) {
                matchDiv.innerHTML = '<i class="fas fa-check me-1" style="color: #10b981;"></i>Passwords match';
                matchDiv.style.color = '#10b981';
                return true;
            }
            matchDiv.innerHTML = '';
            return true;
        }

        // Event listeners
        document.getElementById('password').addEventListener('input', function() {
            checkPasswordStrength(this.value);
            checkPasswordMatch();
        });

        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const organization = document.getElementById('organization').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            // Validation
            if (!agreeTerms) {
                alert('Please agree to the Terms of Service and Privacy Policy.');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }
            
            if (checkPasswordStrength(password) < 2) {
                alert('Please choose a stronger password.');
                return;
            }
            
            // Show loading state
            const submitBtn = document.querySelector('.btn-signup');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';
            submitBtn.disabled = true;
            
            // Send data to Flask backend
            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    fullName: fullName,
                    email: email,
                    organization: organization || '',
                    password: password 
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    // Store user info in localStorage
                    localStorage.setItem('fullName', fullName);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('organization', organization || '');
                    localStorage.setItem('memberSince', new Date().toLocaleString('default', { month: 'long', year: 'numeric' }));
                    
                    alert('✅ Account created successfully! You can now sign in.');
                    window.location.href = 'login.html';
                } else {
                    alert('❌ ' + (data.error || 'Registration failed. Please try again.'));
                }
            })
            .catch(error => {
                console.error('Registration error:', error);
                alert('❌ Could not connect to server. Please ensure the Flask API is running.');
            })
            .finally(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        });

        // Add input focus animations
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
                this.parentElement.style.transition = 'transform 0.3s ease';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });
    </script>
        </div>
    </div>
</body>
</html>
