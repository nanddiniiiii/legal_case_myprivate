<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmarks - Legal Case DBMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #1a1b3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-color: #6366f1;
        }

        body {
            background: #0f0f23;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: rgba(26, 27, 58, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: white !important;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: white !important;
            transform: translateY(-2px);
        }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            padding: 40px;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .bookmark-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
        }

        .bookmark-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(102, 126, 234, 0.3);
        }

        .bookmark-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-decoration: none;
        }

        .bookmark-title:hover {
            text-decoration: underline;
        }

        .bookmark-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 15px 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .bookmark-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bookmark-notes {
            background: rgba(102, 126, 234, 0.15);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.95rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .btn-remove {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(250, 112, 154, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: var(--text-primary);
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        .loading-spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-balance-scale"></i>
                LegalSearch Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navbar-auth-links">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-search me-1"></i>Search</a></li>
                    <li class="nav-item"><a class="nav-link" href="browse.html"><i class="fas fa-folder-open me-1"></i>Browse</a></li>
                    <li class="nav-item"><a class="nav-link active" href="bookmarks.html"><i class="fas fa-bookmark me-1"></i>Bookmarks</a></li>
                    <li class="nav-item"><a class="nav-link" href="analytics-dashboard.html"><i class="fas fa-chart-bar me-1"></i>Analytics</a></li>
                    <li class="nav-item"><a class="nav-link" href="recent-searches.html"><i class="fas fa-history me-1"></i>History</a></li>
                    <li class="nav-item"><a class="nav-link" href="compare.html"><i class="fas fa-columns me-1"></i>Compare</a></li>
                    <li class="nav-item"><a class="nav-link" href="help.html"><i class="fas fa-question-circle me-1"></i>Help</a></li>
                    <li class="nav-item">
                        <a id="themeToggle" class="nav-link" href="#" style="cursor: pointer;" title="Toggle Theme">
                            <i class="fas fa-moon"></i>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="profile.html"><i class="fas fa-user me-1"></i>Account</a></li>
                    <li id="auth-links"></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1><i class="fas fa-bookmark"></i> My Bookmarks</h1>
                    <p class="text-muted mb-0">Your saved legal cases for quick reference</p>
                </div>
                <div id="bookmarkCount" class="text-end">
                    <h2 class="mb-0" style="color: var(--accent-color);">-</h2>
                    <p class="text-muted mb-0">Bookmarks</p>
                </div>
            </div>
        </div>

        <!-- Bookmarks List -->
        <div id="bookmarksList">
            <div class="loading-spinner"></div>
            <p class="text-center" style="color: white;">Loading bookmarks...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://127.0.0.1:5000';

        async function loadBookmarks() {
            const userEmail = localStorage.getItem('userEmail');
            const container = document.getElementById('bookmarksList');

            if (!userEmail) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/bookmarks`, {
                    method: 'GET',
                    headers: {
                        'X-User-Email': userEmail
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load bookmarks');
                }

                const data = await response.json();
                const bookmarks = data.bookmarks;

                document.getElementById('bookmarkCount').querySelector('h2').textContent = bookmarks.length;

                if (bookmarks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-bookmark"></i>
                            <h3>No Bookmarks Yet</h3>
                            <p class="text-muted">Start bookmarking cases to build your collection</p>
                            <a href="index.html" class="btn btn-primary mt-3" style="background: var(--primary-gradient); border: none; padding: 12px 30px; border-radius: 10px; font-weight: 600;">
                                <i class="fas fa-search me-2"></i>Search Cases
                            </a>
                        </div>
                    `;
                    return;
                }

                let html = '';
                bookmarks.forEach(bookmark => {
                    const caseTitle = bookmark.title || `${bookmark.parties || 'Unknown'}`;
                    
                    html += `
                        <div class="bookmark-card" id="bookmark-${bookmark.case_number}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div style="flex: 1;">
                                    <a href="case-details.html?case=${bookmark.case_number}" class="bookmark-title">
                                        ${caseTitle}
                                    </a>
                                    <div class="bookmark-meta">
                                        <span class="bookmark-meta-item">
                                            <i class="fas fa-hashtag"></i>
                                            ${bookmark.case_number}
                                        </span>
                                        <span class="bookmark-meta-item">
                                            <i class="fas fa-tag"></i>
                                            ${bookmark.category || 'N/A'}
                                        </span>
                                        <span class="bookmark-meta-item">
                                            <i class="fas fa-calendar"></i>
                                            ${bookmark.judgment_date || 'N/A'}
                                        </span>
                                        <span class="bookmark-meta-item">
                                            <i class="fas fa-university"></i>
                                            ${bookmark.court_name || 'N/A'}
                                        </span>
                                        <span class="bookmark-meta-item">
                                            <i class="fas fa-clock"></i>
                                            Saved: ${bookmark.bookmarked_at ? new Date(bookmark.bookmarked_at).toLocaleDateString() : 'N/A'}
                                        </span>
                                    </div>
                                    ${bookmark.notes ? `
                                        <div class="bookmark-notes">
                                            <strong><i class="fas fa-sticky-note me-2"></i>Notes:</strong>
                                            ${bookmark.notes}
                                        </div>
                                    ` : ''}
                                </div>
                                <div>
                                    <button class="btn btn-remove" onclick="removeBookmark('${bookmark.case_number}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (error) {
                console.error('Error loading bookmarks:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color: #fa709a;"></i>
                        <h3>Error Loading Bookmarks</h3>
                        <p class="text-muted">${error.message}</p>
                        <button class="btn btn-primary mt-3" onclick="loadBookmarks()" style="background: var(--primary-gradient); border: none; padding: 12px 30px; border-radius: 10px; font-weight: 600;">
                            <i class="fas fa-redo me-2"></i>Try Again
                        </button>
                    </div>
                `;
            }
        }

        async function removeBookmark(caseNumber) {
            const userEmail = localStorage.getItem('userEmail');
            
            if (!confirm('Remove this bookmark?')) return;

            try {
                const response = await fetch(`${API_URL}/api/bookmarks/${encodeURIComponent(caseNumber)}`, {
                    method: 'DELETE',
                    headers: {
                        'X-User-Email': userEmail
                    }
                });

                if (response.ok) {
                    // Remove card from DOM with animation
                    const card = document.getElementById(`bookmark-${caseNumber}`);
                    card.style.transition = 'opacity 0.3s, transform 0.3s';
                    card.style.opacity = '0';
                    card.style.transform = 'translateX(-100%)';
                    
                    setTimeout(() => {
                        card.remove();
                        
                        // Update count
                        const currentCount = parseInt(document.getElementById('bookmarkCount').querySelector('h2').textContent);
                        const newCount = currentCount - 1;
                        document.getElementById('bookmarkCount').querySelector('h2').textContent = newCount;
                        
                        // Show empty state if no bookmarks left
                        if (newCount === 0) {
                            loadBookmarks();
                        }
                    }, 300);
                } else {
                    alert('Failed to remove bookmark');
                }
            } catch (error) {
                console.error('Error removing bookmark:', error);
                alert('Error removing bookmark');
            }
        }

        // Load bookmarks on page load
        document.addEventListener('DOMContentLoaded', loadBookmarks);
    </script>
    <script src="theme-script.js"></script>
</body>
</html>
